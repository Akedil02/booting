spring.application.name=booting

spring.datasource.url = jdbc:postgresql://localhost:5433/booting
spring.datasource.username = postgres
spring.datasource.password = 1234

spring.jpa.hibernate.ddl-auto = validate
spring.jpa.show-sql = true
spring.jpa.database-platform = org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
logging.level.org.flywaydb=DEBUG

server.port=8080

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=test-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Feign demo (can be overridden per environment)
demo.feign.base-url=http://localhost:${server.port}
spring.cloud.openfeign.circuitbreaker.enabled=true

# JWT config (for demo only; override in real env)
security.jwt.secret=change-this-secret-key-at-least-32-bytes!
security.jwt.expiration-minutes=120
